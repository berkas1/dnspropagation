name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f tests/Dockerfile -t dnspropagation-tests .

      - name: Run tests
        run: docker run --rm dnspropagation-tests
